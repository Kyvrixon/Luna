name: Bumpify
volumes:
  pgdata:
  dragonflydata:

services:

  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.37.0
    restart: on-failure:3
    ulimits:
      memlock: -1
    expose:
      - "6379"
    volumes:
      - dragonflydata:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6379 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    restart: on-failure:3
    build:
      dockerfile: docker/backend.Dockerfile
      context: .
    ports:
      - "3000:3000"
    depends_on:
      init-db:
        condition: service_completed_successfully
      # database:
      #   condition: service_healthy
      dragonfly:
        condition: service_healthy
    volumes:
      - ./files:/app/files

  bot:
    container_name: bot
    restart: on-failure:3
    build:
      dockerfile: docker/bot.Dockerfile
      context: .
    depends_on:
      init-db:
        condition: service_completed_successfully
      # database:
      #   condition: service_healthy
      dragonfly:
        condition: service_healthy
    volumes:
      - ./files:/app/files
      - ./assets:/app/assets

  init-db:
    container_name: init-db
    build:
      dockerfile: docker/init-db.Dockerfile
      context: .
    depends_on:
      dragonfly:
        condition: service_healthy
      # database:
      #   condition: service_healthy
    restart: no

